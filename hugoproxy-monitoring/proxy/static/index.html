<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Геосервис API - Swagger UI</title>
    <link rel="stylesheet" type="text/css" href="https://unpkg.com/swagger-ui-dist@5/swagger-ui.css">
    <style>
        html { box-sizing: border-box; overflow-y: scroll; }
        *, *:before, *:after { box-sizing: inherit; }
        body { margin: 0; background: #fafafa; }
        .swagger-ui .topbar { display: none; }
    </style>
</head>
<body>
    <div id="swagger-ui"></div>
    <script src="https://unpkg.com/swagger-ui-dist@5/swagger-ui-bundle.js"></script>
    <script src="https://unpkg.com/swagger-ui-dist@5/swagger-ui-standalone-preset.js"></script>
    <script>
        window.onload = function() {
            // Инициализация Swagger UI
            const ui = SwaggerUIBundle({
                url: "/swagger/doc.json",
                dom_id: '#swagger-ui',
                deepLinking: true,
                presets: [
                    SwaggerUIBundle.presets.apis,
                    SwaggerUIStandalonePreset
                ],
                plugins: [
                    SwaggerUIBundle.plugins.DownloadUrl
                ],
                layout: "StandaloneLayout",
                onComplete: function() {
                    // Восстановление токена из localStorage при загрузке
                    const savedToken = localStorage.getItem('jwt_token');
                    if (savedToken) {
                        ui.authActions.authorize({
                            BearerAuth: {
                                schema: {
                                    type: 'apiKey',
                                    name: 'Authorization',
                                    in: 'header',
                                    description: 'JWT Bearer token'
                                },
                                value: 'Bearer ' + savedToken
                            }
                        });
                        console.log('JWT токен восстановлен из localStorage');
                    }
                },
                requestInterceptor: function(request) {
                    // Автоматическое добавление токена ко всем запросам
                    const savedToken = localStorage.getItem('jwt_token');
                    if (savedToken) {
                        request.headers.Authorization = 'Bearer ' + savedToken;
                    }
                    return request;
                },
                responseInterceptor: function(response) {
                    // Автоматическое сохранение токена после успешного логина
                    if (response.url.includes('/api/login') && response.status === 200) {
                        try {
                            const data = JSON.parse(response.data);
                            if (data.token) {
                                localStorage.setItem('jwt_token', data.token);
                                // Автоматическая авторизация в Swagger UI
                                ui.authActions.authorize({
                                    BearerAuth: {
                                        schema: {
                                            type: 'apiKey',
                                            name: 'Authorization',
                                            in: 'header',
                                            description: 'JWT Bearer token'
                                        },
                                        value: 'Bearer ' + data.token
                                    }
                                });
                                console.log('JWT токен сохранен в localStorage');
                            }
                        } catch (e) {
                            console.error('Ошибка сохранения токена:', e);
                        }
                    }
                    return response;
                }
            });
            
            window.ui = ui;
        };
    </script>
</body>
</html>
